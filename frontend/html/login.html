<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Login</title>
		<link rel="stylesheet" href="/css/style.css">
		<link rel="stylesheet" href="/css/auth.css">
	</head>
	<body>
		<header>
			<div id="navbar"></div>
		</header>
		<main>
			<section class="auth-form">
				<h1>Login</h1>
				<form class="form" id="loginForm">
					<label for="login-email">Email</label><br>
					<input type="text" id="login-email" name="email" placeholder="example@gmail.com"/><br><br>
					<label for="login-password">Password</label><br>
					<input type="text" id="login-password" name="password"/><br><br>
					<button>Login</button>
				</form>
				<br>
				<p>Did you forget your password? Change password</p><br>
				<p>Do you have an account? Register here</p>
			</section>
		</main>
		<footer>
			<div id="footer"></div>
		</footer>
		<script type="module" src="/js/components.js"></script>
		<script type="module" src="/js/login.js"></script>
	</body>
</html>
