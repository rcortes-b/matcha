<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="/css/style.css">
		<link rel="stylesheet" href="/css/form.css">
	</head>
	<body>
		<header>
			<div id="navbar"></div>
		</header>
		<main>
			<section class="auth-form">
				<h1>Complete Profile</h1>
				<form id="completeProfileForm">
				<label for="birthday">Birthdate:</label>
				<input
					type="date"
					id="birthday-input"
					name="birthday"
					max="2008-01-27"
				/><br><br>
				
				<label for="gender">What's your gender?</label>
				<select id="gender">
				<option value="male">Male</option>
				<option value="female">Female</option>
				</select><br><br>
			
				<label for="sexualPreference">What's your sexual preference?</label>
				<select id="sexualPreference">
				<option value="heterosexual">Heterosexual</option>
				<option value="homosexual">Homosexual</option>
				<option value="bisexual">Bisexual</option>
				</select><br><br>
			
				<label for="complete-biography">Biography:</label><br>
				<input type="text" id="complete-biography" name="biography"/><br><br>
			
				<label for="tags">Select at least 3 tags:</label><br>
				<label><input type="checkbox" name="tags" value="fitness">Fitness</label>
				<label><input type="checkbox" name="tags" value="technology">Technology</label>
				<label><input type="checkbox" name="tags" value="hiking">Hiking</label><br><br>
				
				<button>Submit</button>
			
				</form>
			</section>
		</main>
		<footer>
			<div id="footer"></div>
		</footer>
		<script type="module" src="/js/components.js"></script>
		<script type="module" src="/js/complete-profile.js"></script>
	</body>
</html>
