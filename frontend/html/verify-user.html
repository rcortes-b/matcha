<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Verify your email</title>

		<link rel="stylesheet" href="/css/style.css">
		<link rel="stylesheet" href="/css/form.css">
	</head>
	<body>
		<header>
			<div id="header"></div>
		</header>
		<main>
			<section class="auth-form">
				<h1>User Verification</h1>
				<p>A code has been sent to your mail box!</p><br>
				<p>Your email is: </p>
				<label id="verification-email-id"></label> <br>
				<form id="verifyUserForm">
					<label for="Verification-code">Code:</label><br>
					<input type="text" id="Verification-code" name="code"/><br>
					<button>Login</button>
					<button id="resend-code-button">Resend email verification</button>
				</form>
			</section>
		</main>
		<script type="module" src="/js/components.js"></script>
		<script type="module" src="/js/verify-user.js"></script>
	</body>
</html>
