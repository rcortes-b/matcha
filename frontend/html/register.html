<!DOCTYPE html>
<html>
<body>
  <h1>Register Form</h1>
  <form id="registerForm">
	<label for="register-email">Email:</label><br>
    <input type="text" id="register-email" name="email"/><br>
	<label for="register-fName">First Name:</label><br>
    <input type="text" id="register-fName" name="firstName"/><br>
	<label for="register-lName">Last Name:</label><br>
    <input type="text" id="register-lName" name="lastName"/><br>
	<label for="register-password">Password:</label><br>
    <input type="text" id="register-password" name="password"/><br>
	<label for="register-re-password">Re-type Password:</label><br>
    <input type="text" id="register-re-password" name="re-password"/><br>
    <button>Register</button>
  </form>

  <script src="/js/register.js"></script>
</body>
</html>
