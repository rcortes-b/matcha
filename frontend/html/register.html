<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Register</title>
		<link rel="stylesheet" href="/css/style.css">
		<link rel="stylesheet" href="/css/form.css">
	</head>
	<body>
		<header>
			<div id="navbar"></div>
		</header>
		<main>
			<section class="auth-form">
				<h1>Register</h1>
				<form id="registerForm">
					<label for="register-email">Email:</label><br>
					<input type="text" id="register-email" name="email" placeholder="example@gmail.com"/><br>
					<label for="register-fName">First Name:</label><br>
					<input type="text" id="register-fName" name="firstName" placeholder="John"/><br>
					<label for="register-lName">Last Name:</label><br>
					<input type="text" id="register-lName" name="lastName" placeholder="Doe"/><br>
					<label for="register-password">Password:</label><br>
					<input type="text" id="register-password" name="password"/><br>
					<label for="register-re-password">Re-type Password:</label><br>
					<input type="text" id="register-re-password" name="re-password"/><br><br>
					<button>Register</button>
				</form>
				<br>
				<p>Already have an account? <a href="/login">Login here</a></p>
			</section>
		</main>
		<footer>
			<div id="footer"></div>
		</footer>
		<script type="module" src="/js/components.js"></script>
		<script type="module" src="/js/login.js"></script>
	</body>
</html>
