spring:
  application:
    name: Gateway Service
  main:
    web-application-type: reactive
  data:
    redis:
      host: localhost
      port: 6380

server:
  port: 9090

resilience4j:
  circuitbreaker:
    instances:
      authServiceCB:
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 10s
      defaultServiceCB:
        failureRateThreshold: 40
        slidingWindowSize: 15
        waitDurationInOpenState: 5s