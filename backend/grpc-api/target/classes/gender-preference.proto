syntax = "proto3";

option java_multiple_files = true;
option java_package = "me.rcortesb.grpc";
option java_outer_classname = "SearchFilterProto";

service SearchFilterService {
  rpc getSearchFilter (SearchFilterRequest) returns (SearchFilterResponse);
}

message SearchFilterRequest {
  string userId = 1;
}

message SearchFilterResponse {
  string gender = 1;
  string sexualPreference = 2;
  double lat = 3;
  double lon = 4;
}